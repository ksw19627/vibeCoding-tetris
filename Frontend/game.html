<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TETRIS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="game.css" />
</head>
<body>
  <div class="wrapper">

    <!-- 왼쪽 패널 -->
    <div class="panel left-panel">
      <h1 class="title">TETRIS</h1>
      <div class="stat-card">
        <span class="label">PLAYER</span>
        <span class="value player-name" id="player-name">-</span>
      </div>
      <div class="stat-card">
        <span class="label">SCORE</span>
        <span class="value" id="score">0</span>
      </div>
      <div class="stat-card">
        <span class="label">LEVEL</span>
        <span class="value" id="level">1</span>
      </div>
      <div class="stat-card">
        <span class="label">LINES</span>
        <span class="value" id="lines">0</span>
      </div>
    </div>

    <!-- 게임 보드 -->
    <div class="board-wrap">
      <canvas id="board" width="300" height="600"></canvas>
      <div class="clear-popup" id="clear-popup"></div>
      <div class="touch-controls" id="touch-controls">
        <button class="touch-btn" id="touch-left">&#9664;</button>
        <button class="touch-btn" id="touch-rotate">&#8635;</button>
        <button class="touch-btn touch-btn--drop" id="touch-drop">&#9660;&#9660;</button>
        <button class="touch-btn" id="touch-right">&#9654;</button>
      </div>
      <div class="overlay" id="overlay">
        <p class="overlay-title" id="overlay-title">TETRIS</p>
        <p class="overlay-sub" id="overlay-sub">블록을 쌓고 줄을 지워보세요!</p>
        <button class="btn" id="action-btn">START</button>
      </div>
    </div>

    <!-- 오른쪽 패널 -->
    <div class="panel right-panel">
      <!-- TOP 3 랭킹 -->
      <div class="stat-card rankings-card">
        <span class="label">TOP PLAYERS</span>
        <div id="live-rankings">
          <div class="rank-empty">아직 기록이 없습니다</div>
        </div>
      </div>

      <!-- 다음 블록 -->
      <div class="stat-card">
        <span class="label">NEXT</span>
        <canvas id="next-canvas" width="120" height="100"></canvas>
      </div>

      <!-- 조작키 안내 -->
      <div class="controls-card">
        <span class="label">CONTROLS</span>
        <div class="key-row"><kbd>← →</kbd><span>이동</span></div>
        <div class="key-row"><kbd>↑</kbd><span>회전</span></div>
        <div class="key-row"><kbd>↓</kbd><span>빠르게</span></div>
        <div class="key-row"><kbd>SPACE</kbd><span>즉시 낙하</span></div>
        <div class="key-row"><kbd>P</kbd><span>일시정지</span></div>
        <div class="key-row"><kbd>TAP</kbd><span>회전</span></div>
        <div class="key-row"><kbd>SWIPE ↓</kbd><span>즉시 낙하</span></div>
      </div>

      <!-- 로그아웃 -->
      <button class="btn logout-btn" id="logout-btn">LOGOUT</button>
    </div>

  </div>
  <script src="game.js"></script>
</body>
</html>
